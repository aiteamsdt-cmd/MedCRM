<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footline · Demo funcional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --ink:#14211E;--muted:#5C6B67;--faint:#8A9994;--bg:#F2F5F8;--surface:#FFFFFF;--line:#DCE4EC;
  --pine:#1B5D8C;--pine-deep:#0C3A57;--mint:#D8E8F3;--mint-soft:#EEF4FA;
  --gold:#C98A1E;--gold-soft:#FBF1DC;--rose:#C2544B;--rose-soft:#FBE9E7;
  --radius:16px;--shadow:0 1px 2px rgba(20,33,30,.04),0 8px 24px -12px rgba(20,33,30,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
  background:
    linear-gradient(rgba(238,244,250,0.80), rgba(238,244,250,0.80)),
    url('https://res.cloudinary.com/dway4iqeh/image/upload/v1783821481/WhatsApp_Image_2026-07-11_at_21.24.58_1_rtfbv3.jpg') center/cover no-repeat fixed;
}
h1,h2,h3,.dsp{font-family:'Bricolage Grotesque'}
button{font:inherit;cursor:pointer}
a{color:var(--pine)}

/* ---------- LOGIN ---------- */
.login{min-height:100vh;display:grid;place-items:center;padding:24px;
  background:
    linear-gradient(160deg, rgba(12,58,87,0.86), rgba(27,93,140,0.72)),
    url('https://res.cloudinary.com/dway4iqeh/image/upload/v1783821481/WhatsApp_Image_2026-07-11_at_21.24.58_1_rtfbv3.jpg') center/cover no-repeat fixed;
}
.login-card{background:var(--surface);border-radius:24px;box-shadow:0 30px 80px -30px rgba(0,0,0,.5);width:100%;max-width:460px;padding:34px 32px;text-align:center}
.login .logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-stripe{background:#fff;border-radius:16px;padding:14px 22px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(12,58,87,0.12);margin-bottom:14px;}
.logo-stripe img{height:52px;display:block;object-fit:contain;}
.login .logo .name{font-weight:800;font-size:26px;letter-spacing:-.02em}
.login .logo .sub{font-size:11px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase}
.login p.lead{color:var(--muted);margin:2px 0 22px;font-size:13.5px}
.userlist{display:flex;flex-direction:column;gap:9px;text-align:left}
.userbtn{display:flex;align-items:center;gap:13px;border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:12px 14px;transition:.15s;width:100%}
.userbtn:hover{border-color:var(--pine);background:var(--mint-soft);transform:translateY(-1px)}
.userbtn .av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:700;color:#fff;font-size:14px;flex-shrink:0}
.userbtn .who{font-weight:600;font-size:14px}
.userbtn .em{font-size:11.5px;color:var(--faint)}
.userbtn .badge{margin-left:auto;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--mint);color:var(--pine-deep);letter-spacing:.03em}
.login .note{margin-top:18px;font-size:11.5px;color:var(--faint)}

/* ---------- APP SHELL ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:var(--pine-deep);color:#DDEAE6;padding:22px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow:auto}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
.brand-stripe{background:#fff;border-radius:14px;padding:12px 16px;display:inline-flex;align-items:center;justify-content:center;width:100%;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
.brand-stripe img{height:68px;display:block;object-fit:contain;}
.brand .name{font-weight:700;font-size:20px;letter-spacing:-.02em;color:#fff}
.brand .sub{font-size:10.5px;color:#8FB6AE;letter-spacing:.06em;text-transform:uppercase}
.navlabel{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:#6E958D;padding:12px 10px 5px}
.nav button{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:10px;color:#C7DAD5;border:0;background:transparent;font-weight:500;font-size:13.5px;transition:.15s;width:100%;text-align:left}
.nav button:hover{background:rgba(255,255,255,.06);color:#fff}
.nav button.active{background:var(--pine);color:#fff}
.nav button .dot{margin-left:auto;background:var(--gold);color:#14211E;font-size:11px;font-weight:700;border-radius:20px;padding:1px 7px}
.side-foot{margin-top:auto;border-top:1px solid rgba(255,255,255,.09);padding-top:12px}
.side-foot .u{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#14211E;display:grid;place-items:center;font-weight:700;font-size:13px}
.side-foot .who{font-size:13px;font-weight:600;color:#fff}
.side-foot .role{font-size:11px;color:#8FB6AE}
.side-foot .switch{margin-top:11px;width:100%;background:rgba(255,255,255,.08);color:#DDEAE6;border:0;border-radius:9px;padding:8px;font-size:12px;font-weight:600}
.side-foot .switch:hover{background:rgba(255,255,255,.15)}

.main{padding:24px 30px 70px;max-width:1200px}
.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.top h1{font-weight:700;font-size:27px;letter-spacing:-.02em;line-height:1.1}
.top .date{color:var(--muted);font-size:13px;margin-top:3px}
.sedefilter{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px;box-shadow:var(--shadow)}
.sedefilter button{border:0;background:transparent;font-weight:600;font-size:12px;color:var(--muted);padding:6px 12px;border-radius:8px}
.sedefilter button.on{background:var(--mint);color:var(--pine-deep)}

/* cards / kpis */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow)}
.kpi .lbl{color:var(--muted);font-size:12px;font-weight:500}
.kpi .num{font-weight:700;font-size:24px;letter-spacing:-.02em;margin-top:8px;line-height:1}
.kpi .delta{font-size:11.5px;font-weight:600;margin-top:5px}
.up{color:var(--pine)}.down{color:var(--rose)}
.sedes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.sede{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.sede .tag{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:13px}
.sede .tag .sw{width:9px;height:9px;border-radius:3px}
.sede .big{font-weight:700;font-size:24px;letter-spacing:-.02em;margin-top:11px;line-height:1}
.sede .cap{color:var(--faint);font-size:11.5px;margin-top:3px}
.sede .row{display:flex;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
.sede .row b{color:var(--ink);font-weight:600}

.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
.card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}
.card h3{font-weight:600;font-size:16px;letter-spacing:-.01em}

/* toolbar */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 13px;box-shadow:var(--shadow)}
.search input{border:0;outline:0;font:inherit;width:100%;background:transparent}
.btn{background:var(--pine);color:#fff;border:0;border-radius:11px;padding:9px 15px;font-weight:600;font-size:13px;box-shadow:var(--shadow)}
.btn:hover{background:var(--pine-deep)}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:var(--mint-soft)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:9px}

/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 14px 10px}
td{padding:12px 14px;border-top:1px solid var(--line);font-size:13.5px;vertical-align:middle}
tr.clickable:hover{background:var(--mint-soft);cursor:pointer}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
.pill.ok{background:var(--mint);color:var(--pine-deep)}
.pill.wait{background:var(--gold-soft);color:var(--gold)}
.pill.risk{background:var(--rose-soft);color:var(--rose)}
.pager{display:flex;justify-content:space-between;align-items:center;margin-top:14px;color:var(--muted);font-size:12.5px}
.pager button{border:1px solid var(--line);background:var(--surface);border-radius:9px;padding:6px 12px;font-weight:600;font-size:12px}
.pager button:disabled{opacity:.4;cursor:not-allowed}

/* agenda */
.apt{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.apt:first-of-type{border-top:0}
.apt .time{font-weight:700;font-family:'Bricolage Grotesque';font-size:13px;width:46px;color:var(--pine-deep)}
.apt .who{font-weight:600;font-size:13.5px}
.apt .meta{font-size:12px;color:var(--muted)}
.apt .actions{margin-left:auto;display:flex;gap:6px;align-items:center}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(10,33,29,.45);display:none;place-items:center;padding:20px;z-index:50}
.overlay.show{display:grid}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:480px;padding:26px;box-shadow:0 30px 80px -30px rgba(0,0,0,.5);max-height:90vh;overflow:auto}
.modal h3{font-size:19px;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font:inherit;outline:0}
.field input:focus,.field select:focus{border-color:var(--pine)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pine-deep);color:#fff;padding:11px 20px;border-radius:12px;font-size:13.5px;font-weight:500;opacity:0;transition:.25s;z-index:60;box-shadow:0 12px 30px -10px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* rendimiento por sede */
.perf td{vertical-align:middle}
.bar-cell{min-width:170px}
.bar-track{height:7px;background:var(--mint-soft);border-radius:6px;overflow:hidden;margin-top:6px}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty .em-ic{font-size:34px;opacity:.4}
.empty h4{font-family:'Bricolage Grotesque';font-size:16px;margin:10px 0 4px;color:var(--ink)}
.hint{background:var(--gold-soft);border:1px solid #EBD9AE;color:#7A5410;border-radius:12px;padding:11px 14px;font-size:12.5px;margin-bottom:16px}

/* footer copyright fijo, visible en toda la plataforma */
.footer-copy{
  position:fixed !important;bottom:12px;right:16px;z-index:9999;
  font-size:11px;color:#fff;background:rgba(12,58,87,0.6);backdrop-filter:blur(3px);
  padding:5px 12px;border-radius:20px;font-weight:500;letter-spacing:.01em;
  pointer-events:none;white-space:nowrap;
}
@media(max-width:600px){ .footer-copy{ font-size:9.5px; padding:4px 9px; bottom:8px; right:8px; } }

/* ficha clínica del paciente */
.ftabs{display:flex;gap:4px;border-bottom:1.5px solid var(--line);margin:16px 0 18px;overflow-x:auto}
.ftab{padding:9px 14px;font-size:13px;font-weight:600;color:var(--muted);border:0;border-bottom:2.5px solid transparent;background:none;white-space:nowrap}
.ftab.on{color:var(--pine);border-bottom-color:var(--pine)}
.reg-item{background:var(--mint-soft);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.reg-item .rhead{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--pine-deep);margin-bottom:5px;font-size:12.5px;gap:10px}
.reg-item .rhead .racc{display:flex;gap:4px;flex-shrink:0}
.reg-item .rbody{color:var(--muted);font-size:13px;line-height:1.55}
.reg-item .rbody b{color:var(--ink)}
.campo-ficha{display:flex;flex-direction:column;gap:2px}
.campo-ficha .et{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.05em}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(124px,1fr));gap:12px}
.doc-item{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--mint-soft)}
.doc-item img{width:100%;height:82px;object-fit:cover;display:block}
.doc-item .doc-ico{height:82px;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--pine)}
.doc-item .doc-info{padding:7px 9px;font-size:11px}
.doc-item .doc-info b{display:block;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-item .doc-acc{display:flex;justify-content:space-between;padding:0 9px 8px}

@media(max-width:940px){
  .app{grid-template-columns:1fr}
  .side{position:static;height:auto}
  .main{padding:18px}
  .kpis{grid-template-columns:1fr 1fr}.sedes{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="root"></div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<div class="footer-copy">© 2026 Kraibe Solutions. Todos los derechos reservados.</div>

<script>
if(typeof pdfjsLib !== 'undefined'){ pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
/* ============ DATA ============ */
const SEDES = ['CITSALUD','KIDDO','KMOTION'];
const SEDE_COLOR = {CITSALUD:'#1B5D8C', KIDDO:'#C98A1E', KMOTION:'#8A9994'};
const PROS = {
  CITSALUD:['Klga. Rojas','Klgo. Pérez','Klga. Muñoz'],
  KIDDO:['Klga. Tapia'],
  KMOTION:['Klgo. Vera']
};
const SERVICIOS = ['Sesión kinésica','Evaluación inicial','Terapia manual','Rehabilitación','Control','Evaluación postural'];

const USERS = [
  {email:'admin@kraibe.cl', name:'Gabriel Kraemer', role:'KRAIBE_ADMIN', sede:null, av:'#0C3A57', badge:'KRAIBE'},
  {email:'owner@footline.test', name:'Javier Meneses', role:'OWNER', sede:null, av:'#1B5D8C', badge:'OWNER'},
  {email:'citsalud@footline.test', name:'Recepción CITSALUD', role:'SECRETARIA', sede:'CITSALUD', av:'#1B5D8C', badge:'CITSALUD'},
  {email:'kiddo@footline.test', name:'Recepción KIDDO', role:'SECRETARIA', sede:'KIDDO', av:'#C98A1E', badge:'KIDDO'},
  {email:'kmotion@footline.test', name:'Recepción KMOTION', role:'SECRETARIA', sede:'KMOTION', av:'#8A9994', badge:'KMOTION'},
];

const NOMBRES = ['María Fuentes','Tomás Rivas','Carla Núñez','Ignacio Soto','Paula Vega','Diego Álvarez','Fernanda Cortés','Sebastián Reyes','Valentina Muñoz','Matías Herrera','Josefa Castro','Benjamín Rojas','Antonia Silva','Vicente Torres','Camila Fuenzalida','Joaquín Bravo','Isidora Pinto','Cristóbal Vera','Florencia Díaz','Agustín Morales','Martina Sepúlveda','Gabriel Araya','Emilia Gutiérrez','Lucas Navarrete','Sofía Cárdenas','Maximiliano Ortiz','Amanda Riquelme','Felipe Salazar','Catalina Poblete','Renato Miranda','Trinidad Espinoza','Bastián Contreras','Javiera Lagos','Nicolás Fuentealba','Constanza Vidal','Alonso Peña','Magdalena Rubio','Damián Cáceres','Rocío Valdés','Emiliano Godoy'];

function rut(){ let n=Math.floor(7000000+Math.random()*15000000); return n.toLocaleString('es-CL')+'-'+Math.floor(Math.random()*10); }
function daysAgo(d){ const x=new Date(); x.setDate(x.getDate()-d); return x.toISOString().slice(0,10); }
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function money(n){ return '$'+Math.round(n).toLocaleString('es-CL'); }

const DB = { patients:[], appointments:[], sales:[], expenses:[], debts:[], billing:[] };

function seed(){
  // patients — weighted toward CITSALUD
  const SEXOS=['Femenino','Masculino'];
  const PREVISIONES=['FONASA','ISAPRE','Particular'];
  const GRUPOS=['O+','A+','B+','O-','A-','AB+'];
  NOMBRES.forEach((nom,i)=>{
    const r=Math.random(); const sede = r<0.72?'CITSALUD':(r<0.92?'KIDDO':'KMOTION');
    const edad = 12+Math.floor(Math.random()*60);
    const hist=[]; const nh=1+Math.floor(Math.random()*5);
    for(let h=0;h<nh;h++) hist.push({id:h+1, fecha:daysAgo(Math.floor(Math.random()*180)), motivo:pick(SERVICIOS), pro:pick(PROS[sede]), diagnostico:'', tratamiento:''});
    hist.sort((a,b)=>a.fecha<b.fecha?1:-1);
    DB.patients.push({id:i+1, nombre:nom, rut:rut(), sede, edad, telefono:'+569 '+(4000+Math.floor(Math.random()*5000))+' '+(1000+Math.floor(Math.random()*8999)), ultima:hist[0].fecha, historial:hist,
      fechaNacimiento:daysAgo(edad*365), sexo:pick(SEXOS), direccion:'', prevision:pick(PREVISIONES), contactoEmergencia:'', alergias:'', antecedentes:'', medicamentosHabituales:'', grupoSanguineo:pick(GRUPOS),
      recetas:[], derivaciones:[], examenes:[], licencias:[], documentos:[]});
  });
  // appointments today + next days
  const horas=['09:00','09:45','10:30','11:15','12:00','15:00','16:00','16:45','17:30'];
  let aid=1;
  for(let d=0;d<3;d++){
    const n=6+Math.floor(Math.random()*4);
    for(let k=0;k<n;k++){
      const p=pick(DB.patients);
      const est = Math.random()<0.35?'sin_confirmar':(Math.random()<0.5?'pendiente':'confirmada');
      DB.appointments.push({id:aid++, fecha:daysAgo(-d), hora:pick(horas), pacienteId:p.id, paciente:p.nombre, sede:p.sede, pro:pick(PROS[p.sede]), motivo:pick(SERVICIOS), estado:est});
    }
  }
  DB.appointments.sort((a,b)=> a.fecha===b.fecha ? (a.hora<b.hora?-1:1) : (a.fecha<b.fecha?-1:1));
  // sales last 7 days
  let sid=1;
  for(let d=0;d<7;d++){
    const n=4+Math.floor(Math.random()*7);
    for(let k=0;k<n;k++){
      const p=pick(DB.patients);
      DB.sales.push({id:sid++, fecha:daysAgo(d), pacienteId:p.id, paciente:p.nombre, sede:p.sede, servicio:pick(SERVICIOS), monto:15000+Math.floor(Math.random()*8)*5000, pago:Math.random()<0.78?'pagado':'pendiente'});
    }
  }
  DB.sales.sort((a,b)=>a.fecha<b.fecha?1:-1);
  // expenses
  const cats=['Insumos clínicos','Arriendo','Servicios básicos','Marketing','Sueldos','Mantención'];
  let eid=1;
  for(let d=0;d<7;d++){ if(Math.random()<0.7){ const sede=pick(SEDES); DB.expenses.push({id:eid++, fecha:daysAgo(d), sede, categoria:pick(cats), descripcion:'Egreso operacional', monto:20000+Math.floor(Math.random()*15)*10000, comprobante:null}); } }
  DB.expenses.sort((a,b)=>a.fecha<b.fecha?1:-1);
  // debts (from pending sales)
  DB.sales.filter(s=>s.pago==='pendiente').slice(0,8).forEach((s,i)=>{
    DB.debts.push({id:i+1, paciente:s.paciente, sede:s.sede, monto:s.monto, dias:5+Math.floor(Math.random()*40), estado:'activa'});
  });
  // billing Kraibe<->Footline
  DB.billing=[
    {mes:'Julio 2026', concepto:'Licencia mensual Footline MVP', monto:390000, estado:'pendiente'},
    {mes:'Junio 2026', concepto:'Licencia mensual Footline MVP', monto:390000, estado:'pagado'},
    {mes:'Junio 2026', concepto:'Setup + importación histórico', monto:850000, estado:'pagado'},
  ];
}
seed();

/* ============ SESSION / STATE ============ */
const S = { user:null, view:'dashboard', sedeFilter:'all', patientPage:0, patientQuery:'', detail:null, patientTab:'datos', commission:15 };

function visibleSedes(){
  if(S.user.role==='SECRETARIA') return [S.user.sede];
  return S.sedeFilter==='all' ? SEDES : [S.sedeFilter];
}
function inScope(sede){ return visibleSedes().includes(sede); }
function isSecretaria(){ return S.user.role==='SECRETARIA'; }
function canBilling(){ return S.user.role==='OWNER' || S.user.role==='KRAIBE_ADMIN'; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function unconfirmedToday(){ return DB.appointments.filter(a=>a.fecha===todayStr() && inScope(a.sede) && a.estado!=='confirmada').length; }

function go(v){ S.view=v; S.detail=null; document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); shell(); }

function topbar(title, sub, withFilter){
  let filter='';
  if(withFilter && !isSecretaria()){
    filter=`<div class="sedefilter">
      <button class="${S.sedeFilter==='all'?'on':''}" onclick="setFilter('all')">Todas</button>
      ${SEDES.map(s=>`<button class="${S.sedeFilter===s?'on':''}" onclick="setFilter('${s}')">${s}</button>`).join('')}
    </div>`;
  }
  return `<div class="top"><div><h1>${title}</h1><div class="date">${sub}</div></div>${filter}</div>`;
}
function setFilter(s){ S.sedeFilter=s; S.patientPage=0; render(); }

function render(){
  const v=document.getElementById('view'); if(!v) return;
  ({dashboard:vDashboard, pacientes:vPacientes, citas:vCitas, ventas:vVentas,
    recuperacion:vRecuperacion, cuadratura:vCuadratura, gastos:vGastos, billing:vBilling, import:vImport}[S.view]||vDashboard)(v);
}

/* ---- DASHBOARD ---- */
function vDashboard(v){
  const sedes=visibleSedes();
  const salesScope=DB.sales.filter(s=>sedes.includes(s.sede));
  const ingHoy=salesScope.filter(s=>s.fecha===todayStr()).reduce((a,s)=>a+s.monto,0);
  const pac=DB.patients.filter(p=>sedes.includes(p.sede)).length;
  const citasHoy=DB.appointments.filter(a=>a.fecha===todayStr()&&sedes.includes(a.sede));
  const deuda=DB.debts.filter(d=>sedes.includes(d.sede)&&d.estado==='activa').reduce((a,d)=>a+d.monto,0);
  const first=S.user.name.split(' ')[0];

  const sedeCards = sedes.map(sd=>{
    const ing=DB.sales.filter(s=>s.sede===sd).reduce((a,s)=>a+s.monto,0);
    const np=DB.patients.filter(p=>p.sede===sd).length;
    return `<div class="sede">
      <div class="tag"><span class="sw" style="background:${SEDE_COLOR[sd]}"></span>${sd}</div>
      <div class="big">${money(ing)}</div><div class="cap">Ingresos acumulados</div>
      <div class="row"><span>${np} pacientes</span><b>${sd==='KMOTION'?'<span style="color:var(--gold)">Nueva</span>':'activa'}</b></div>
    </div>`;
  }).join('');

  const agenda = citasHoy.filter(a=>a.estado!=='confirmada').slice(0,6).map(a=>`
    <div class="apt"><span class="time">${a.hora}</span>
      <div><div class="who">${a.paciente}</div><div class="meta">${a.sede} · ${a.motivo}</div></div>
      <div class="actions"><span class="pill ${a.estado==='sin_confirmar'?'risk':'wait'}">${a.estado==='sin_confirmar'?'Sin confirmar':'Pendiente'}</span>
      <button class="btn sm" onclick="confirmApt(${a.id})">Confirmar</button></div>
    </div>`).join('') || `<div class="empty"><div class="em-ic">✓</div><h4>Todo confirmado</h4><p>No quedan citas pendientes por hoy.</p></div>`;

  v.innerHTML = topbar(`Buenos días, ${first}`, `${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})} · ${isSecretaria()?'Sede '+S.user.sede:'Vista consolidada'}`, true)
  + `<section class="sedes">${sedeCards}</section>
  <section class="kpis">
    <div class="kpi"><div class="lbl">Ingresos hoy</div><div class="num">${money(ingHoy)}</div><div class="delta up">▲ ventas del día</div></div>
    <div class="kpi"><div class="lbl">Pacientes activos</div><div class="num">${pac}</div><div class="delta up">en cartera</div></div>
    <div class="kpi"><div class="lbl">Citas hoy</div><div class="num">${citasHoy.length}</div><div class="delta down">${citasHoy.filter(a=>a.estado!=='confirmada').length} por confirmar</div></div>
    <div class="kpi"><div class="lbl">Por recuperar</div><div class="num">${money(deuda)}</div><div class="delta down">${DB.debts.filter(d=>sedes.includes(d.sede)&&d.estado==='activa').length} deudas</div></div>
  </section>
  ${sedePerfBlock()}
  <div class="grid2">
    <div class="card"><div class="head"><h3>Ingresos últimos 7 días</h3></div>${sparkChart(salesScope)}</div>
    <div class="card"><div class="head"><h3>Citas por confirmar · hoy</h3><a href="#" onclick="go('citas');return false">Agenda →</a></div>${agenda}</div>
  </div>`;
}

function sedePerfBlock(){
  const sedes=visibleSedes();
  if(sedes.length<2) return ''; // comparación solo tiene sentido con 2+ sedes (no para secretarias)
  const rows=sedes.map(sd=>{
    const sales=DB.sales.filter(s=>s.sede===sd);
    const ing=sales.reduce((a,s)=>a+s.monto,0);
    const ventas=sales.length;
    const ticket=ventas?ing/ventas:0;
    const cit=DB.appointments.filter(a=>a.sede===sd);
    const conf=cit.length?Math.round(cit.filter(a=>a.estado==='confirmada').length/cit.length*100):0;
    const pac=DB.patients.filter(p=>p.sede===sd).length;
    const deuda=DB.debts.filter(d=>d.sede===sd&&d.estado==='activa').reduce((a,d)=>a+d.monto,0);
    return {sd,ing,ventas,ticket,conf,pac,deuda};
  }).sort((a,b)=>b.ing-a.ing);
  const totalIng=rows.reduce((a,r)=>a+r.ing,0)||1;
  const maxIng=Math.max(...rows.map(r=>r.ing),1);
  const leader=rows[0];
  const confClass=c=>c>=80?'ok':c>=60?'wait':'risk';
  return `<div class="card" style="margin-bottom:16px">
    <div class="head"><h3>Rendimiento por sede</h3>
      <span style="font-size:12px;color:var(--muted)">${leader.sd} lidera con ${Math.round(leader.ing/totalIng*100)}% de los ingresos</span></div>
    <table class="perf"><thead><tr>
      <th>Sede</th><th>Ingresos</th><th>Pacientes</th><th>Ticket prom.</th><th>Confirmación</th><th>Por recuperar</th></tr></thead><tbody>
      ${rows.map((r,i)=>`<tr>
        <td><span class="pill" style="background:${SEDE_COLOR[r.sd]}22;color:${SEDE_COLOR[r.sd]}">${r.sd}</span>${i===0?' <span class="pill ok" style="margin-left:4px">Líder</span>':''}</td>
        <td class="bar-cell"><b>${money(r.ing)}</b> <small style="color:var(--faint)">${Math.round(r.ing/totalIng*100)}%</small>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.ing/maxIng*100)}%;background:${SEDE_COLOR[r.sd]}"></div></div></td>
        <td>${r.pac}</td>
        <td>${money(r.ticket)}</td>
        <td><span class="pill ${confClass(r.conf)}">${r.conf}%</span></td>
        <td class="down">${r.deuda?money(r.deuda):'—'}</td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

function sparkChart(sales){
  const days=[6,5,4,3,2,1,0].map(d=>{ const f=daysAgo(d); return sales.filter(s=>s.fecha===f).reduce((a,s)=>a+s.monto,0); });
  const max=Math.max(...days,1);
  const pts=days.map((val,i)=>`${20+i*85},${180-(val/max)*140}`).join(' ');
  const area=`20,180 ${pts} ${20+6*85},180`;
  const labels=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  return `<svg width="100%" height="200" viewBox="0 0 560 200" preserveAspectRatio="none">
    <polyline points="${area}" fill="#D8E8F3" opacity=".5"/>
    <polyline points="${pts}" fill="none" stroke="#1B5D8C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    ${days.map((v,i)=>`<circle cx="${20+i*85}" cy="${180-(v/max)*140}" r="3.5" fill="#1B5D8C"/>`).join('')}
  </svg>
  <div style="display:flex;justify-content:space-between;color:var(--faint);font-size:11px;margin-top:4px">${labels.map(l=>`<span>${l}</span>`).join('')}</div>`;
}

/* ---- PACIENTES ---- */
function vPacientes(v){
  if(S.detail){ return patientDetail(v); }
  const sedes=visibleSedes();
  let list=DB.patients.filter(p=>sedes.includes(p.sede));
  if(S.patientQuery){ const q=S.patientQuery.toLowerCase(); list=list.filter(p=>p.nombre.toLowerCase().includes(q)||p.rut.includes(q)); }
  const per=8, pages=Math.max(1,Math.ceil(list.length/per));
  if(S.patientPage>=pages) S.patientPage=0;
  const slice=list.slice(S.patientPage*per,(S.patientPage+1)*per);

  v.innerHTML = topbar('Pacientes', `${list.length} en cartera${isSecretaria()?' · '+S.user.sede:''}`, false)
  + `<div class="toolbar">
      <div class="search">🔎<input placeholder="Buscar por nombre o RUT…" value="${S.patientQuery}" oninput="searchPatient(this.value)"></div>
      <button class="btn" onclick="modalNuevoPaciente()">＋ Nuevo paciente</button>
    </div>
    <div class="card" style="padding:8px 0 14px">
      <table><thead><tr><th>Paciente</th><th>RUT</th><th>Sede</th><th>Edad</th><th>Última visita</th><th></th></tr></thead><tbody>
      ${slice.map(p=>`<tr class="clickable" onclick="openPatient(${p.id})">
        <td><b>${p.nombre}</b></td><td>${p.rut}</td>
        <td><span class="pill" style="background:${SEDE_COLOR[p.sede]}22;color:${SEDE_COLOR[p.sede]}">${p.sede}</span></td>
        <td>${p.edad}</td><td>${p.ultima}</td><td style="text-align:right;color:var(--faint)">›</td></tr>`).join('')}
      </tbody></table>
      ${slice.length===0?'<div class="empty"><div class="em-ic">◔</div><h4>Sin resultados</h4><p>Ajusta la búsqueda o agrega un paciente.</p></div>':''}
      <div class="pager" style="padding:0 14px">
        <span>Página ${S.patientPage+1} de ${pages}</span>
        <div style="display:flex;gap:8px">
          <button onclick="pPage(-1)" ${S.patientPage===0?'disabled':''}>‹ Anterior</button>
          <button onclick="pPage(1)" ${S.patientPage>=pages-1?'disabled':''}>Siguiente ›</button>
        </div>
      </div>
    </div>`;
}
function searchPatient(q){ S.patientQuery=q; S.patientPage=0; render(); const inp=document.querySelector('.search input'); if(inp){inp.focus(); inp.setSelectionRange(inp.value.length,inp.value.length);} }
function pPage(d){ S.patientPage+=d; render(); }
function openPatient(id){ S.detail=DB.patients.find(p=>p.id===id); S.patientTab='datos'; render(); }

function patientDetail(v){
  const p=S.detail;
  const tabs=[['datos','Ficha'],['historial','Historial'],['recetas','Recetas'],['derivaciones','Derivaciones'],['examenes','Exámenes'],['licencias','Licencias'],['documentos','Documentos']];
  v.innerHTML = `<div class="top"><div><h1>${p.nombre}</h1><div class="date">${p.rut} · ${p.edad} años · ${p.telefono} · <span class="pill" style="background:${SEDE_COLOR[p.sede]}22;color:${SEDE_COLOR[p.sede]}">${p.sede}</span></div></div>
    <div style="display:flex;gap:8px"><button class="btn ghost" onclick="modalNuevaCita(${p.id})">＋ Agendar cita</button><button class="btn ghost" onclick="backPatients()">‹ Volver</button></div></div>
    <div class="ftabs">${tabs.map(([id,label])=>`<button class="ftab ${S.patientTab===id?'on':''}" onclick="setPatientTab('${id}')">${label}</button>`).join('')}</div>
    <div id="ficha-content">${renderFichaTab(p, S.patientTab)}</div>`;
}
function setPatientTab(tab){ S.patientTab=tab; render(); }
function backPatients(){ S.detail=null; render(); }
function eliminarSub(pid, campo, itemId){
  const p=DB.patients.find(x=>x.id===pid); if(!p) return;
  p[campo]=p[campo].filter(it=>it.id!==itemId);
  toast('Registro eliminado'); render();
}
function campoFicha(label,val){ return `<div class="campo-ficha"><span class="et">${label}</span><b>${val||'—'}</b></div>`; }

function renderFichaTab(p,tab){
  if(tab==='datos'){
    return `<div class="card">
      <div class="head"><h3>Datos de la ficha</h3><button class="btn sm ghost" onclick="modalEditarFicha(${p.id})">✎ Editar ficha</button></div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px 24px">
        ${campoFicha('Fecha de nacimiento', p.fechaNacimiento)}
        ${campoFicha('Sexo', p.sexo)}
        ${campoFicha('Previsión', p.prevision)}
        ${campoFicha('Grupo sanguíneo', p.grupoSanguineo)}
        ${campoFicha('Dirección', p.direccion)}
        ${campoFicha('Contacto de emergencia', p.contactoEmergencia)}
        <div style="grid-column:1/-1">${campoFicha('Alergias', p.alergias||'Ninguna registrada')}</div>
        <div style="grid-column:1/-1">${campoFicha('Antecedentes médicos', p.antecedentes)}</div>
        <div style="grid-column:1/-1">${campoFicha('Medicamentos habituales', p.medicamentosHabituales)}</div>
      </div>
    </div>`;
  }

  if(tab==='historial'){
    const items=[...p.historial].sort((a,b)=>a.fecha<b.fecha?1:-1);
    return `<div class="card"><div class="head"><h3>Historial clínico</h3><button class="btn sm" onclick="modalSesion(${p.id})">＋ Nueva atención</button></div>
      ${items.length?items.map(h=>`
        <div class="reg-item"><div class="rhead"><span>${h.fecha} · ${h.pro}</span><span class="racc"><button class="btn sm ghost" onclick="eliminarSub(${p.id},'historial',${h.id})">✕</button></span></div>
        <div class="rbody"><b>Motivo:</b> ${h.motivo}${h.diagnostico?`<br><b>Diagnóstico:</b> ${h.diagnostico}`:''}${h.tratamiento?`<br><b>Tratamiento:</b> ${h.tratamiento}`:''}</div></div>`).join('')
        :'<div class="empty"><div class="em-ic">◔</div><h4>Sin atenciones registradas</h4></div>'}
    </div>`;
  }

  if(tab==='recetas'){
    const items=[...p.recetas].sort((a,b)=>a.fecha<b.fecha?1:-1);
    return `<div class="card"><div class="head"><h3>Recetas médicas</h3><button class="btn sm" onclick="modalReceta(${p.id})">＋ Nueva receta</button></div>
      ${items.length?items.map(r=>`
        <div class="reg-item"><div class="rhead"><span>${r.fecha} · ${r.pro}</span>
          <span class="racc"><button class="btn sm ghost" onclick="imprimirReceta(${p.id},${r.id})" title="Imprimir">🖨</button><button class="btn sm ghost" onclick="eliminarSub(${p.id},'recetas',${r.id})">✕</button></span></div>
        <div class="rbody"><b>${r.medicamento}</b> — ${r.dosis}${r.indicaciones?`<br>${r.indicaciones}`:''}</div></div>`).join('')
        :'<div class="empty"><div class="em-ic">℞</div><h4>Sin recetas registradas</h4></div>'}
    </div>`;
  }

  if(tab==='derivaciones'){
    const items=[...p.derivaciones].sort((a,b)=>a.fecha<b.fecha?1:-1);
    return `<div class="card"><div class="head"><h3>Derivaciones</h3><button class="btn sm" onclick="modalDerivacion(${p.id})">＋ Nueva derivación</button></div>
      ${items.length?items.map(d=>`
        <div class="reg-item"><div class="rhead"><span>${d.fecha} · De ${d.pro} a ${d.destino}</span><span class="racc"><button class="btn sm ghost" onclick="eliminarSub(${p.id},'derivaciones',${d.id})">✕</button></span></div>
        <div class="rbody"><b>Motivo:</b> ${d.motivo||'—'}</div></div>`).join('')
        :'<div class="empty"><div class="em-ic">↷</div><h4>Sin derivaciones registradas</h4></div>'}

    const items=[...p.examenes].sort((a,b)=>a.fecha<b.fecha?1:-1);
    return `<div class="card"><div class="head"><h3>Exámenes</h3><button class="btn sm" onclick="modalExamen(${p.id})">＋ Nuevo examen</button></div>
      ${items.length?items.map(x=>`

    </div>`;

/* ---- CITAS ---- */
function vCitas(v){
  const sedes=visibleSedes();
  const list=DB.appointments.filter(a=>sedes.includes(a.sede));
  const byDay={};
  list.forEach(a=>{ (byDay[a.fecha]=byDay[a.fecha]||[]).push(a); });

/* ---- LECTURA AUTOMÁTICA DE COMPROBANTES (OCR / PDF) ---- */
async function procesarAdjuntoGasto(input){
  const file = input.files[0];
  if(!file) return;
  const estado = document.getElementById('ng-estado-lectura');
  estado.style.display='block'; estado.style.color='var(--pine)';
  estado.textContent = '⏳ Leyendo documento, esto puede tardar unos segundos...';
  if(file.size > 8*1024*1024){ estado.style.color='var(--rose)'; estado.textContent='⚠ El archivo supera 8MB, no se pudo procesar.'; return; }
  try{
    const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=e=>res(e.target.result); r.onerror=rej; r.readAsDataURL(file); });
    window.__ngAdjunto = { nombre:file.name, tipo:file.type, data:dataUrl };

    let texto = '';
    if(file.type === 'application/pdf'){
      texto = await extraerTextoPDF(dataUrl);
      if(!texto || texto.trim().length < 6) texto = await extraerTextoPDFconOCR(dataUrl);
    } else if(file.type.startsWith('image/')){
      texto = await extraerTextoImagen(dataUrl);
    }

    if(texto && texto.trim().length > 3){
      const datos = interpretarTextoGasto(texto);
      if(datos.monto) document.getElementById('ng-monto').value = datos.monto;
      if(datos.fecha) document.getElementById('ng-fecha').value = datos.fecha;
      if(datos.proveedor) document.getElementById('ng-desc').value = datos.proveedor;
      if(datos.categoria) document.getElementById('ng-cat').value = datos.categoria;
      estado.style.color='var(--pine)';
      estado.textContent = '✓ Datos extraídos del documento. Revisa y ajusta los campos antes de guardar.';
    } else {
      estado.style.color='var(--rose)';
      estado.textContent = '⚠ No se pudo extraer texto legible del documento (puede ser una imagen de baja calidad). Completa los datos manualmente. El archivo igual quedará adjunto al gasto.';
    }
  }catch(err){
    console.error(err);
    estado.style.color='var(--rose)';
    estado.textContent = '⚠ Ocurrió un error al leer el documento. Completa los datos manualmente; el archivo igual quedará adjunto.';
  }
}
async function extraerTextoImagen(dataUrl){
  if(typeof Tesseract === 'undefined') return '';
  const { data:{ text } } = await Tesseract.recognize(dataUrl, 'spa+eng');
  return text || '';
}
async function extraerTextoPDF(dataUrl){
  if(typeof pdfjsLib === 'undefined') return '';
  const pdf = await pdfjsLib.getDocument({url:dataUrl}).promise;
  let texto = '';
  const maxPaginas = Math.min(pdf.numPages, 3);
  for(let i=1;i<=maxPaginas;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    texto += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return texto;
}
async function extraerTextoPDFconOCR(dataUrl){
  if(typeof pdfjsLib === 'undefined' || typeof Tesseract === 'undefined') return '';
  const pdf = await pdfjsLib.getDocument({url:dataUrl}).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({scale:2});
  const canvas = document.createElement('canvas');
  canvas.width = viewport.width; canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');
  await page.render({canvasContext:ctx, viewport}).promise;
  const { data:{ text } } = await Tesseract.recognize(canvas.toDataURL('image/png'), 'spa+eng');
  return text || '';
}
function interpretarTextoGasto(texto){
  const limpio = texto.replace(/\s+/g,' ').trim();
  const resultado = {};

  const numeros = [...limpio.matchAll(/\$?\s?([0-9]{1,3}(?:[.,][0-9]{3})+|[0-9]{4,})/g)]
    .map(m=>parseInt(m[1].replace(/[.,]/g,''),10)).filter(n=>n>=100 && n<50000000);
  const matchTotal = limpio.match(/total[^0-9]{0,15}\$?\s?([0-9]{1,3}(?:[.,][0-9]{3})+|[0-9]{4,})/i);
  if(matchTotal) resultado.monto = parseInt(matchTotal[1].replace(/[.,]/g,''),10);
  else if(numeros.length) resultado.monto = Math.max(...numeros);

  const matchFecha = limpio.match(/([0-3]?[0-9])[\/\-]([01]?[0-9])[\/\-](20[0-9]{2})/);
  if(matchFecha){
    const d=matchFecha[1].padStart(2,'0'), m=matchFecha[2].padStart(2,'0'), y=matchFecha[3];
    resultado.fecha = `${y}-${m}-${d}`;
  }

  const lineas = texto.split('\n').map(l=>l.trim()).filter(l=>l.length>3);
  const posibleProveedor = lineas.find(l=>/[a-zA-ZÁÉÍÓÚáéíóúñÑ]{4,}/.test(l) && !/factura|boleta|rut|total|fecha/i.test(l));
  if(posibleProveedor) resultado.proveedor = posibleProveedor.slice(0,60);

  const cats = {
    'Insumos clínicos': /insumo|clinic|medic|kinesio|material/i,
    'Arriendo': /arriendo|renta|alquiler/i,
    'Servicios básicos': /luz|agua|electricidad|gas|internet|telefon/i,
    'Marketing': /marketing|publicidad|redes|ads/i,
    'Sueldos': /sueldo|remuneraci|honorario|nomina/i,
    'Mantención': /mantenci|reparaci|tecnico/i
  };
  for(const [cat,rex] of Object.entries(cats)){ if(rex.test(limpio)){ resultado.categoria = cat; break; } }

  return resultado;
}

function saveS(pid){

/* ---- EXÁMENES ---- */
function modalExamen(pid){
  openModal(`<h3>Nuevo examen</h3>
    <div class="field"><label>Fecha</label><input id="ex-fecha" type="date" value="${todayStr()}"></div>
    <div class="field"><label>Tipo de examen</label><input id="ex-tipo" placeholder="Ej: Radiografía, Ecografía..."></div>
    <div class="field"><label>Resultado / observaciones</label><input id="ex-res" placeholder="Resultado"></div>
    <div class="field"><label>Adjuntar archivo (imagen o PDF, opcional)</label><input id="ex-file" type="file" accept="image/*,.pdf"></div>
    <div class="modal-actions"><button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="saveExamen(${pid})">Guardar examen</button></div>`);
}
function saveExamen(pid){
  const tipo=val('ex-tipo'); if(!tipo){toast('Ingresa el tipo de examen');return;}
  const fecha=val('ex-fecha')||todayStr(), resultado=val('ex-res');
  const file=document.getElementById('ex-file').files[0];
  const p=DB.patients.find(x=>x.id===pid);
  const guardar=(dataUrl)=>{
    const nid=(p.examenes.length?Math.max(...p.examenes.map(r=>r.id))+1:1);
    p.examenes.push({id:nid, fecha, tipo, resultado, archivo:dataUrl||null});
    closeModal(); toast('Examen guardado ✓'); render();
  };
  if(file){
    if(file.size>4*1024*1024){ toast('El archivo supera 4MB'); return; }
    const reader=new FileReader(); reader.onload=e=>guardar(e.target.result); reader.readAsDataURL(file);
  } else guardar(null);
}

function saveLicencia(pid){
  const diag=val('lc-diag'); if(!diag){toast('Ingresa el diagnóstico');return;}
  const fecha=val('lc-fecha')||todayStr(), dias=val('lc-dias')||1;
  const file=document.getElementById('lc-file').files[0];
  const p=DB.patients.find(x=>x.id===pid);
  const guardar=(dataUrl)=>{
    const nid=(p.licencias.length?Math.max(...p.licencias.map(r=>r.id))+1:1);

    closeModal(); toast('Licencia guardada ✓'); render();
  };
  if(file){
    if(file.size>4*1024*1024){ toast('El archivo supera 4MB'); return; }
    const reader=new FileReader(); reader.onload=e=>guardar(e.target.result); reader.readAsDataURL(file);
  } else guardar(null);
}

/* ---- DOCUMENTOS ---- */
function subirDocumento(pid, input){
  const file=input.files[0]; if(!file) return;
  if(file.size>4*1024*1024){ toast('El archivo supera 4MB'); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    const p=DB.patients.find(x=>x.id===pid);
    const nid=(p.documentos.length?Math.max(...p.documentos.map(r=>r.id))+1:1);
    p.documentos.push({id:nid, nombre:file.name, tipo:file.type, fecha:todayStr(), data:e.target.result});
    toast('Documento cargado ✓'); render();
  };
  reader.readAsDataURL(file);
}

  w.document.close(); w.focus();
  setTimeout(()=>{ try{ w.print(); }catch(e){} }, 400);
}

function imprimirLicencia(pid, lid){
